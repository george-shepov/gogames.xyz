<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="shared/icons/tictak-icon-192.png">
  <link rel="apple-touch-icon" href="shared/icons/tictak-icon-512.png">
  <link rel="stylesheet" href="shared/shadcn.css">
  <link rel="stylesheet" href="shared/launcher-explorer.css">

  <title>FieldKit</title>
  <style>
    body {
      min-height: 100vh;
      padding: 24px;
      background:
        radial-gradient(circle at 15% 10%, rgba(244, 244, 245, 0.05) 0%, rgba(244, 244, 245, 0) 34%),
        radial-gradient(circle at 88% 0%, rgba(99, 102, 241, 0.12) 0%, rgba(99, 102, 241, 0) 40%),
        linear-gradient(180deg, #09090b 0%, #0d0d10 100%);
    }
    .container { max-width: 1040px; margin: 0 auto; }
    
    .header {
      text-align: center;
      padding: 48px 24px;
      margin-bottom: 24px;
    }
    .header h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 12px;
    }
    .header p { color: var(--muted-foreground); font-size: 1.125rem; }

    .launcher-controls {
      margin-bottom: 24px;
      padding: 16px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }
    
    .category {
      margin-bottom: 20px;
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      background-color: hsl(var(--card) / 0.5);
      backdrop-filter: blur(4px);
      overflow: hidden;
    }
    .category-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .category-header:hover { background: hsl(var(--accent)); }
    .category-title {
      font-size: 1.125rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .category-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: hsl(var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      color: hsl(var(--foreground));
    }
    
    .app-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid hsl(var(--border));
      transition: background 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .app-item:hover { background: hsl(var(--accent) / 0.5); }
    .app-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .app-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: hsl(var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .app-icon img {
      width: 24px;
      height: 24px;
      filter: brightness(0) invert(1);
    }
    
    .app-name { font-weight: 600; font-size: 1rem; }
    .app-desc { font-size: 0.875rem; color: hsl(var(--muted-foreground)); }

    /* Custom overrides for shadcn look */
    .badge-connectivity {
      font-size: 10px;
      padding: 2px 8px;
      letter-spacing: 0.05em;
    }
    
    .help-overlay {
      position: fixed;
      inset: 0;
      display: none;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      padding: 20px;
      z-index: 100;
    }
    .help-overlay.open { display: flex; justify-content: center; align-items: center; }
    .help-dialog {
      width: min(800px, 100%);
      max-height: 90vh;
      overflow: auto;
    }

    @media (max-width: 640px) {
      .app-desc { display: none; }
      .launcher-controls { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>FieldKit</h1>
      <p>Offline-first lobby for tools, training, and field workflows</p>
      <div class="header-tools flex items-center justify-center gap-2 m-b-4" style="margin-top: 24px;">
        <button id="openHelpBtn" class="s-btn s-btn-outline" type="button"><i data-lucide="help-circle" size="18"></i> Help</button>
        <button id="installAppBtn" class="s-btn s-btn-primary" type="button"><i data-lucide="download" size="18"></i> Install</button>
        <button id="signOutBtn" class="s-btn s-btn-outline" type="button" style="color: #ef4444; border-color: rgba(239, 68, 68, 0.2);"><i data-lucide="log-out" size="18"></i> Sign Out</button>
      </div>
      <div class="flex items-center justify-center gap-2 text-muted" style="font-size: 0.875rem;">
        <span>Press <kbd class="s-badge s-badge-outline" style="border-radius: 4px; padding: 0 4px;">F1</kbd> anywhere</span>
        <span id="installHint"></span>
      </div>
    </div>
    
    <div class="launcher-controls s-card" aria-label="Launcher controls">
      <div class="flex items-center gap-4 flex-wrap">
        <div class="flex items-center gap-2">
          <label class="text-muted font-semibold" style="font-size: 0.75rem; text-transform: uppercase;">View</label>
          <select id="sortModeSelect" class="s-select" style="width: auto;">
            <option value="categories">By Category</option>
            <option value="az">A-Z</option>
            <option value="za">Z-A</option>
            <option value="recent">Most Recent</option>
            <option value="favorites">Favorites Only</option>
          </select>
        </div>
        <div class="flex items-center gap-2">
          <label class="text-muted font-semibold" style="font-size: 0.75rem; text-transform: uppercase;">Connectivity</label>
          <select id="connectivityFilterSelect" class="s-select" style="width: auto;">
            <option value="all">All</option>
            <option value="airplane">Airplane Mode</option>
            <option value="wifi">Wi-Fi / Cell</option>
          </select>
        </div>
        <button id="clearRecentBtn" class="s-btn s-btn-ghost s-btn-sm" type="button">Clear Recent</button>
      </div>
    </div>

    <div id="content">
      <div class="loading flex flex-direction-column items-center justify-center p-4" style="padding: 100px 0;">
        <div class="spinner m-b-4"></div>
        <p class="text-muted">Scanning for apps...</p>
      </div>
    </div>
  </div>
  
  <div id="helpOverlay" class="help-overlay" aria-hidden="true">
    <div class="help-dialog s-card" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
      <div class="s-card-header flex-direction-row justify-between items-center" style="border-bottom: 1px solid hsl(var(--border));">
        <div>
          <h2 id="helpTitle" class="s-card-title">Suite Help</h2>
          <p class="s-card-description">Main features and scenarios for each app</p>
        </div>
        <button id="closeHelpBtn" class="s-btn s-btn-ghost s-btn-icon" type="button" aria-label="Close help"><i data-lucide="x"></i></button>
      </div>
      <div id="helpBody" class="help-body" style="padding: 20px;"></div>
    </div>
  </div>

            <h2 style="color: #ef4444; margin-bottom: 16px;">No Apps Found</h2>
            <p style="color: #94a3b8;">Make sure app folders are in the same directory as this file.</p>
            <p style="color: #64748b; margin-top: 12px; font-size: 0.9em;">Expected structure: ./app-name/index.html</p>
          </div>
        `;
      } else if (totalApps === 1) {
        const singleApp = Object.values(foundApps)
          .find(cat => cat.found.length > 0).found[0];
        
        document.getElementById('content').innerHTML = `
          <div class="loading">
            <div class="spinner"></div>
            <p>Opening ${singleApp.name}...</p>
          </div>
        `;
        
        setTimeout(() => {
          window.location.href = toAppHref(singleApp);
        }, 500);
      } else {
        renderCurrentLauncher(foundApps);
      }
      const sortModeSelect = document.getElementById('sortModeSelect');
      if (sortModeSelect) {
        sortModeSelect.value = getSortMode();
        sortModeSelect.addEventListener('change', () => {
          setSortMode(sortModeSelect.value);
          if (cachedApps) renderCurrentLauncher(cachedApps);
        });
      }
      const connectivityFilterSelect = document.getElementById('connectivityFilterSelect');
      if (connectivityFilterSelect) {
        connectivityFilterSelect.value = getConnectivityFilter();
        connectivityFilterSelect.addEventListener('change', () => {
          setConnectivityFilter(connectivityFilterSelect.value);
          if (cachedApps) renderCurrentLauncher(cachedApps);
        });
      }
      const clearRecentBtn = document.getElementById('clearRecentBtn');
      if (clearRecentBtn) {
        clearRecentBtn.addEventListener('click', () => {
          saveRecentMap({});
          if (cachedApps && getSortMode() === 'recent') renderCurrentLauncher(cachedApps);
        });
      }
      const contentEl = document.getElementById('content');
      if (contentEl) {
        contentEl.addEventListener('click', e => {
          const favBtn = e.target.closest('button.favorite-btn[data-favorite-btn="1"]');
          if (favBtn) {
            e.preventDefault();
            e.stopPropagation();
            toggleFavoriteApp(favBtn.getAttribute('data-app-key'));
            if (cachedApps) renderCurrentLauncher(cachedApps);
            return;
          }
          const link = e.target.closest('a.app-item[data-app-key]');
          if (!link) return;
          markRecentApp(link.getAttribute('data-app-key'));
        });
      }
      document.getElementById('openHelpBtn').addEventListener('click', openHelp);
      const installBtn = document.getElementById('installAppBtn');
      if (installBtn) {
        installBtn.addEventListener('click', handleInstallClick);
      }
      const signOutBtn = document.getElementById('signOutBtn');
      if (signOutBtn) {
        signOutBtn.addEventListener('click', () => {
          clearLoginState();
          window.location.href = 'landing.html?signed_out=1';
        });
      }
      if (isStandaloneMode()) {
        setInstallAck(true);
        if (installBtn) installBtn.style.display = 'none';
      } else {
        refreshInstallButton();
        setInstallHint('Tip: for compass/GPS on iPhone use HTTPS, then Add to Home Screen.');
      }
      document.getElementById('closeHelpBtn').addEventListener('click', closeHelp);
      document.getElementById('helpOverlay').addEventListener('click', e => {
        if (e.target.id === 'helpOverlay') closeHelp();
      });
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        deferredInstallPrompt = e;
        setInstallHint('Ready: tap Install to add app icon.');
      });
      window.addEventListener('appinstalled', () => {
        setInstallAck(true);
        setInstallHint('Installed successfully.');
        if (installBtn) installBtn.style.display = 'none';
      });
      const displayModeMedia = window.matchMedia('(display-mode: standalone)');
      if (displayModeMedia && typeof displayModeMedia.addEventListener === 'function') {
        displayModeMedia.addEventListener('change', () => {
          if (isStandaloneMode()) setInstallAck(true);
          refreshInstallButton();
        });
      }
      document.addEventListener('keydown', e => {
        if (e.key === 'F1') {
          e.preventDefault();
          if (!cachedApps) return;
          openHelp();
        }
        if (e.key === 'Escape') closeHelp();
      });
      const params = new URLSearchParams(window.location.search);
      if (params.get('help') === '1') openHelp();
    }

    init();
  </script>
  <script src="./shared/launcher-explorer.js"></script>
</body>
</html>
